spring.application.name=backend
server.port=${PORT:8088}

# ── MongoDB ───────────────────────────────────────────────────────────────────
# Set MONGO_URI env var on Render/Railway to your Atlas connection string
# e.g. mongodb+srv://<user>:<password>@cluster.mongodb.net/examdb?retryWrites=true&w=majority
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/examdb}

# ── JWT ───────────────────────────────────────────────────────────────────────
# Must be at least 32 characters. Override with JWT_SECRET env var in production.
jwt.secret=${JWT_SECRET:ThisIsADefaultSecretKeyForDevOnly1234567}

# ── CORS ──────────────────────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGIN to your Vercel frontend URL on Render/Railway
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}
